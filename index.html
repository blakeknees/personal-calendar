<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Calendar">
<meta name="theme-color" content="#378ADD">
<title>My Calendar</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f1;min-height:100vh}
#app{padding:1rem}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.toolbar h1{font-size:20px;font-weight:500;color:#1a1a1a}
.toolbar button{font-size:13px;padding:6px 14px;cursor:pointer;border-radius:6px;border:0.5px solid #ddd;background:#fff;color:#444}
.btn-primary{background:#378ADD !important;color:#fff !important;border:none !important}
.year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.month-card{background:#fff;border:0.5px solid #e8e6e0;border-radius:12px;overflow:hidden}
.month-header{padding:11px 16px;border-bottom:0.5px solid #e8e6e0;font-size:14px;font-weight:500;color:#1a1a1a}
.day-labels{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 6px 2px}
.day-labels span{text-align:center;font-size:11px;color:#aaa;padding:2px 0}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:2px 4px 6px;gap:2px}
.day-cell{min-height:90px;border-radius:5px;padding:4px 3px 3px;cursor:pointer;transition:background 0.1s;overflow:hidden;display:flex;flex-direction:column}
.day-cell:hover{background:#f5f4f1}
.day-cell.empty{cursor:default}
.day-cell.empty:hover{background:transparent}
.day-num{font-size:11px;color:#aaa;text-align:center;margin-bottom:2px;flex-shrink:0}
.day-cell.today .day-num span{background:#378ADD;color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.appts-wrap{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
.appt-pill{border-radius:3px;padding:2px 4px;font-size:9px;font-weight:500;color:#fff;overflow:hidden;line-height:1.45;cursor:pointer;display:flex;flex-direction:column;flex-shrink:0}
.appt-pill.urgent{border-left:2px solid rgba(0,0,0,0.3)}
.pill-top{display:flex;align-items:center;gap:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill-label{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill-time{font-size:8px;opacity:0.85;white-space:nowrap;flex-shrink:0}
.pill-notes{font-size:8px;opacity:0.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.more-count{font-size:8px;color:#aaa;padding-left:2px;margin-top:1px}
.todo-indicator{display:flex;align-items:center;gap:3px;margin-top:2px;padding-left:2px}
.todo-dot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.todo-indicator-text{font-size:8px;color:#1D9E75}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:#fff;border:0.5px solid #e8e6e0;border-radius:12px;padding:1.25rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:#1a1a1a}

/* day detail modal */
.modal-tabs{display:flex;gap:0;margin-bottom:1rem;border:0.5px solid #e0ddd6;border-radius:8px;overflow:hidden}
.modal-tab{flex:1;padding:7px;font-size:12px;text-align:center;cursor:pointer;background:#f9f8f6;color:#888;border:none;transition:all 0.1s}
.modal-tab.active{background:#378ADD;color:#fff}
.section-title{font-size:11px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:8px}

/* appointment items in day modal */
.appt-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;background:#f9f8f6;cursor:pointer;border:0.5px solid #eeeae4;margin-bottom:6px}
.appt-item:hover{background:#f0ede8}
.appt-color-bar{width:3px;border-radius:2px;align-self:stretch;min-height:16px;flex-shrink:0}
.appt-title-wrap{flex:1;min-width:0}
.appt-title{font-size:13px;color:#1a1a1a;font-weight:500}
.appt-sub{font-size:11px;color:#aaa;margin-top:2px}
.appt-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.appt-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500}
.badge-urgent{background:#FCEBEB;color:#A32D2D}
.badge-allday{background:#E6F1FB;color:#185FA5}

/* todo items in day modal */
.todo-list{display:flex;flex-direction:column;gap:2px}
.todo-item{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:0.5px solid #f0ede8;cursor:pointer}
.todo-item:last-of-type{border-bottom:none}
.todo-check{width:18px;height:18px;border-radius:4px;border:1.5px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.todo-check.done{background:#1D9E75;border-color:#1D9E75}
.todo-check svg{width:10px;height:10px}
.todo-text{font-size:13px;color:#1a1a1a;flex:1}
.todo-text.done{text-decoration:line-through;color:#bbb}
.todo-delete{font-size:16px;color:#ddd;cursor:pointer;padding:0 2px;line-height:1}
.todo-delete:hover{color:#E24B4A}
.todo-add-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.todo-add-row input{flex:1;font-size:13px;padding:8px 10px;border:0.5px solid #ddd;border-radius:6px;background:#f9f8f6;color:#1a1a1a;outline:none}
.todo-add-row input:focus{border-color:#1D9E75}
.todo-add-btn{background:#1D9E75;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer}

/* appt form */
.field{margin-bottom:12px}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px}
.field input,.field textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field textarea:focus{border-color:#378ADD}
.field textarea{resize:vertical;min-height:56px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.1s}
.color-swatch.selected{border-color:#1a1a1a;transform:scale(1.15)}
.toggle-row{display:flex;gap:12px}
.toggle-btn{font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#888;transition:all 0.1s}
.toggle-btn.active{background:#378ADD;color:#fff;border-color:#378ADD}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;flex-wrap:wrap}
.modal-actions button{font-size:13px;padding:7px 16px;cursor:pointer;border-radius:6px}
.btn-cancel{background:#fff;border:0.5px solid #ddd;color:#888}
.btn-save{background:#378ADD;color:#fff;border:none}
.btn-delete{background:#fff;border:0.5px solid #E24B4A;color:#A32D2D;margin-right:auto}

@media(max-width:600px){
  .year-grid{grid-template-columns:1fr}
  .day-cell{min-height:80px}
}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <h1 id="year-label">2026</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="changeYear(-1)">← Prev</button>
      <button onclick="changeYear(1)">Next →</button>
      <button class="btn-primary" onclick="openNewAppt(null)">+ Appointment</button>
    </div>
  </div>
  <div class="year-grid" id="year-grid"></div>
</div>
<div id="overlay" class="overlay" style="display:none">
  <div class="modal" id="modal"></div>
</div>

<script>
const COLORS=[
  {hex:'#378ADD'},{hex:'#1D9E75'},{hex:'#D85A30'},{hex:'#D4537E'},
  {hex:'#639922'},{hex:'#BA7517'},{hex:'#E24B4A'},{hex:'#7F77DD'},{hex:'#888780'}
];

let currentYear=2026;
const todayDate=new Date();
const ty=todayDate.getFullYear(),tm=todayDate.getMonth(),td=todayDate.getDate();
const todayStr=`${ty}-${String(tm+1).padStart(2,'0')}-${String(td).padStart(2,'0')}`;

function makeSeedDate(offset){
  const d=new Date(todayDate);d.setDate(d.getDate()+offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const seedAppts=[
  {id:'seed1',title:'Team standup',date:makeSeedDate(0),time:'09:00',notes:'Daily sync',color:'#378ADD',allDay:false,urgent:false},
  {id:'seed2',title:'Project deadline',date:makeSeedDate(0),time:'',notes:'Submit final report',color:'#E24B4A',allDay:false,urgent:true},
  {id:'seed3',title:'Doctor appointment',date:makeSeedDate(2),time:'14:30',notes:'Annual checkup',color:'#1D9E75',allDay:false,urgent:false},
  {id:'seed4',title:'Conference',date:makeSeedDate(4),time:'',notes:'All day tech conf',color:'#7F77DD',allDay:true,urgent:false},
  {id:'seed5',title:'Lunch with Alex',date:makeSeedDate(5),time:'12:00',notes:'',color:'#D85A30',allDay:false,urgent:false},
  {id:'seed6',title:'Dentist',date:makeSeedDate(8),time:'10:00',notes:'',color:'#BA7517',allDay:false,urgent:false},
];

const seedTodos=[
  {id:'t1',date:makeSeedDate(0),text:'Review meeting notes',done:true},
  {id:'t2',date:makeSeedDate(0),text:'Prepare slide deck',done:false},
  {id:'t3',date:makeSeedDate(0),text:'Email stakeholders',done:false},
  {id:'t4',date:makeSeedDate(2),text:'Pick up prescription',done:false},
];

let appointments=[];
let todos=[];
try{appointments=JSON.parse(localStorage.getItem('mycal_appts')||'[]')}catch(e){}
try{todos=JSON.parse(localStorage.getItem('mycal_todos')||'[]')}catch(e){}
seedAppts.forEach(s=>{if(!appointments.find(a=>a.id===s.id))appointments.push(s);});
seedTodos.forEach(s=>{if(!todos.find(t=>t.id===s.id))todos.push(s);});
saveAll();

let editingId=null,selectedColor=COLORS[0].hex,isAllDay=false,isUrgent=false;
let activeTab='appts';

function saveAll(){
  try{
    localStorage.setItem('mycal_appts',JSON.stringify(appointments));
    localStorage.setItem('mycal_todos',JSON.stringify(todos));
  }catch(e){}
}

function changeYear(d){currentYear+=d;document.getElementById('year-label').textContent=currentYear;renderYear();}

function renderYear(){
  const grid=document.getElementById('year-grid');grid.innerHTML='';
  for(let m=0;m<12;m++)grid.appendChild(buildMonth(currentYear,m));
}

function buildMonth(year,month){
  const names=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const card=document.createElement('div');card.className='month-card';
  const hdr=document.createElement('div');hdr.className='month-header';hdr.textContent=names[month];card.appendChild(hdr);
  const dl=document.createElement('div');dl.className='day-labels';
  days.forEach(d=>{const s=document.createElement('span');s.textContent=d;dl.appendChild(s);});card.appendChild(dl);
  const grid=document.createElement('div');grid.className='days-grid';
  const firstDay=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const cell=document.createElement('div');cell.className='day-cell';
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(dateStr===todayStr)cell.classList.add('today');
    const numDiv=document.createElement('div');numDiv.className='day-num';
    numDiv.innerHTML=dateStr===todayStr?`<span>${d}</span>`:d;cell.appendChild(numDiv);
    const wrap=document.createElement('div');wrap.className='appts-wrap';
    const dayAppts=appointments.filter(a=>a.date===dateStr).sort((a,b)=>{
      if(b.urgent!==a.urgent)return b.urgent?1:-1;
      if(b.allDay!==a.allDay)return b.allDay?1:-1;
      return(a.time||'').localeCompare(b.time||'');
    });
    dayAppts.slice(0,3).forEach(a=>{
      const pill=document.createElement('div');pill.className='appt-pill'+(a.urgent?' urgent':'');pill.style.background=a.color;
      const top=document.createElement('div');top.className='pill-top';
      if(a.urgent){const b=document.createElement('span');b.textContent='!';b.style.cssText='background:rgba(0,0,0,0.2);border-radius:2px;padding:0 2px;font-size:8px;flex-shrink:0';top.appendChild(b);}
      else if(a.allDay){const b=document.createElement('span');b.textContent='ALL DAY';b.style.cssText='background:rgba(0,0,0,0.2);border-radius:2px;padding:0 2px;font-size:7px;flex-shrink:0';top.appendChild(b);}
      const tl=document.createElement('span');tl.className='pill-label';tl.textContent=a.title;top.appendChild(tl);
      if(a.time){const ts=document.createElement('span');ts.className='pill-time';ts.textContent=a.time.slice(0,5);top.appendChild(ts);}
      pill.appendChild(top);
      if(a.notes){const n=document.createElement('div');n.className='pill-notes';n.textContent=a.notes;pill.appendChild(n);}
      pill.onclick=e=>{e.stopPropagation();openEditAppt(a.id);};wrap.appendChild(pill);
    });
    if(dayAppts.length>3){const m=document.createElement('div');m.className='more-count';m.textContent=`+${dayAppts.length-3} more`;wrap.appendChild(m);}
    // todo indicator
    const dayTodos=todos.filter(t=>t.date===dateStr);
    const pendingTodos=dayTodos.filter(t=>!t.done);
    if(dayTodos.length>0){
      const ind=document.createElement('div');ind.className='todo-indicator';
      const dot=document.createElement('div');dot.className='todo-dot';ind.appendChild(dot);
      const txt=document.createElement('span');txt.className='todo-indicator-text';
      txt.textContent=pendingTodos.length>0?`${pendingTodos.length} task${pendingTodos.length>1?'s':''}`:' done';
      ind.appendChild(txt);wrap.appendChild(ind);
    }
    cell.appendChild(wrap);cell.onclick=()=>openDayModal(dateStr);grid.appendChild(cell);
  }
  card.appendChild(grid);return card;
}

function openDayModal(dateStr,tab){
  activeTab=tab||'appts';
  const [y,m,d]=dateStr.split('-');
  const label=new Date(+y,+m-1,+d).toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const appts=appointments.filter(a=>a.date===dateStr).sort((a,b)=>{
    if(b.urgent!==a.urgent)return b.urgent?1:-1;
    if(b.allDay!==a.allDay)return b.allDay?1:-1;
    return(a.time||'').localeCompare(b.time||'');
  });
  const dayTodos=todos.filter(t=>t.date===dateStr);

  let html=`<h2>${label}</h2>
<div class="modal-tabs">
  <button class="modal-tab ${activeTab==='appts'?'active':''}" onclick="switchTab('${dateStr}','appts')">Appointments (${appts.length})</button>
  <button class="modal-tab ${activeTab==='todos'?'active':''}" onclick="switchTab('${dateStr}','todos')">To-do (${dayTodos.length})</button>
</div>`;

  if(activeTab==='appts'){
    if(appts.length){
      appts.forEach(a=>{
        let badges='';
        if(a.urgent)badges+=`<span class="appt-badge badge-urgent">Urgent</span>`;
        if(a.allDay)badges+=`<span class="appt-badge badge-allday">All-day</span>`;
        html+=`<div class="appt-item" onclick="openEditAppt('${a.id}')">
          <div class="appt-color-bar" style="background:${a.color}"></div>
          <div class="appt-title-wrap">
            <div class="appt-title">${escHtml(a.title)}</div>
            ${a.time||a.notes?`<div class="appt-sub">${a.time?a.time+' · ':''}${escHtml(a.notes||'')}</div>`:''}
            ${badges?`<div class="appt-badges">${badges}</div>`:''}
          </div>
        </div>`;
      });
    }else{
      html+=`<p style="font-size:13px;color:#aaa;margin-bottom:12px">No appointments for this day.</p>`;
    }
    html+=`<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Close</button><button class="btn-save" onclick="openNewAppt('${dateStr}')">+ Add appointment</button></div>`;
  }

  if(activeTab==='todos'){
    html+=`<div class="todo-list" id="todo-list-${dateStr}">`;
    dayTodos.forEach(t=>{
      html+=`<div class="todo-item" id="todo-${t.id}">
        <div class="todo-check ${t.done?'done':''}" onclick="toggleTodo('${t.id}','${dateStr}')">
          ${t.done?`<svg viewBox="0 0 10 10" fill="none" stroke="#fff" stroke-width="2"><polyline points="2,5 4,7 8,3"/></svg>`:''}
        </div>
        <span class="todo-text ${t.done?'done':''}">${escHtml(t.text)}</span>
        <span class="todo-delete" onclick="deleteTodo('${t.id}','${dateStr}')">×</span>
      </div>`;
    });
    html+=`</div>
<div class="todo-add-row">
  <input id="todo-input-${dateStr}" type="text" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTodo('${dateStr}')"/>
  <button class="todo-add-btn" onclick="addTodo('${dateStr}')">Add</button>
</div>
<div class="modal-actions" style="margin-top:1rem"><button class="btn-cancel" onclick="closeModal()">Close</button></div>`;
  }

  showModal(html);
}

function switchTab(dateStr,tab){openDayModal(dateStr,tab);}

function addTodo(dateStr){
  const input=document.getElementById('todo-input-'+dateStr);
  const text=input.value.trim();if(!text)return;
  todos.push({id:'t'+Date.now(),date:dateStr,text,done:false});
  saveAll();openDayModal(dateStr,'todos');renderYear();
}

function toggleTodo(id,dateStr){
  const t=todos.find(x=>x.id===id);if(t)t.done=!t.done;
  saveAll();openDayModal(dateStr,'todos');renderYear();
}

function deleteTodo(id,dateStr){
  todos=todos.filter(t=>t.id!==id);
  saveAll();openDayModal(dateStr,'todos');renderYear();
}

function openNewAppt(dateStr){
  editingId=null;selectedColor=COLORS[0].hex;isAllDay=false;isUrgent=false;
  renderApptForm(null,dateStr||todayStr);
}
function openEditAppt(id){
  const a=appointments.find(x=>x.id===id);if(!a)return;
  editingId=id;selectedColor=a.color;isAllDay=a.allDay;isUrgent=a.urgent;renderApptForm(a,a.date);
}
function renderApptForm(appt,dateVal){
  const html=`<h2>${appt?'Edit':'New'} appointment</h2>
<div class="field"><label>Title</label><input id="f-title" type="text" value="${appt?escHtml(appt.title):''}" placeholder="Appointment title"/></div>
<div class="field"><label>Date</label><input id="f-date" type="date" value="${dateVal}"/></div>
<div class="field"><label>Time (optional)</label><input id="f-time" type="time" value="${appt&&appt.time?appt.time:''}"/></div>
<div class="field"><label>Notes</label><textarea id="f-notes">${appt&&appt.notes?escHtml(appt.notes):''}</textarea></div>
<div class="field"><label>Colour</label><div class="color-row">${COLORS.map(c=>`<div class="color-swatch ${c.hex===selectedColor?'selected':''}" style="background:${c.hex}" data-hex="${c.hex}" onclick="pickColor('${c.hex}')"></div>`).join('')}</div></div>
<div class="field"><label>Options</label><div class="toggle-row">
<button class="toggle-btn ${isAllDay?'active':''}" id="btn-allday" onclick="toggleAllDay()">All-day</button>
<button class="toggle-btn ${isUrgent?'active':''}" id="btn-urgent" onclick="toggleUrgent()">Urgent</button>
</div></div>
<div class="modal-actions">
${appt?`<button class="btn-delete" onclick="deleteAppt('${appt.id}')">Delete</button>`:''}
<button class="btn-cancel" onclick="closeModal()">Cancel</button>
<button class="btn-save" onclick="saveAppt()">Save</button>
</div>`;
  showModal(html);
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pickColor(hex){selectedColor=hex;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('selected',s.dataset.hex===hex));}
function toggleAllDay(){isAllDay=!isAllDay;document.getElementById('btn-allday').classList.toggle('active',isAllDay);}
function toggleUrgent(){isUrgent=!isUrgent;document.getElementById('btn-urgent').classList.toggle('active',isUrgent);}

function saveAppt(){
  const title=document.getElementById('f-title').value.trim();if(!title)return;
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const notes=document.getElementById('f-notes').value.trim();
  if(editingId){const idx=appointments.findIndex(a=>a.id===editingId);if(idx>-1)appointments[idx]={id:editingId,title,date,time,notes,color:selectedColor,allDay:isAllDay,urgent:isUrgent};}
  else appointments.push({id:'a'+Date.now(),title,date,time,notes,color:selectedColor,allDay:isAllDay,urgent:isUrgent});
  saveAll();closeModal();renderYear();
}
function deleteAppt(id){appointments=appointments.filter(a=>a.id!==id);saveAll();closeModal();renderYear();}
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').style.display='flex';}
function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

renderYear();
</script>
</body>
</html>
